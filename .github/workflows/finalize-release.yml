name: Finalize npm release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact npm version that has been reviewed and approved
        required: true
        type: string

concurrency:
  group: release-finalize
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve approved npm artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.metadata.outputs.commit }}
      integrity: ${{ steps.metadata.outputs.integrity }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: metadata
        name: Resolve immutable registry metadata
        env:
          VERSION: ${{ inputs.version }}
        run: node scripts/release-metadata.mjs "$VERSION"

  finalize:
    name: Verify and tag pi-hunk@${{ needs.resolve.outputs.version }}
    needs: resolve
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_COMMIT: ${{ needs.resolve.outputs.commit }}
      RELEASE_INTEGRITY: ${{ needs.resolve.outputs.integrity }}
      RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - name: Check out the exact commit recorded by npm
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.commit }}
          fetch-depth: 0
      - uses: jdx/mise-action@v3
        with:
          cache: true
          install: true
      - run: npm ci --ignore-scripts
      - name: Verify checkout identity and release gates
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test "$(node -p 'require("./package.json").version')" = "$RELEASE_VERSION"
          mise run check
      - name: Reproduce and verify the published tarball
        run: node scripts/verify-release-tarball.mjs "$RELEASE_INTEGRITY"
      - name: Refuse an existing tag or release
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release already exists: $RELEASE_TAG" >&2
            exit 1
          fi
      - name: Tag the verified npm source commit
        run: |
          git tag "$RELEASE_TAG" "$RELEASE_COMMIT"
          git push origin "refs/tags/$RELEASE_TAG"
      - name: Create the GitHub release
        run: gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --generate-notes

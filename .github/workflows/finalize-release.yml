name: Finalize npm release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact npm version that has been reviewed and approved
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve approved npm artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.metadata.outputs.commit }}
      integrity: ${{ steps.metadata.outputs.integrity }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - id: metadata
        name: Resolve immutable registry metadata
        env:
          VERSION: ${{ inputs.version }}
        run: node scripts/release-metadata.mjs "$VERSION"

  verify:
    name: Verify pi-hunk@${{ needs.resolve.outputs.version }}
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_COMMIT: ${{ needs.resolve.outputs.commit }}
      RELEASE_INTEGRITY: ${{ needs.resolve.outputs.integrity }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - name: Check out the exact commit recorded by npm
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          cache: true
          install: true
      - run: npm ci --ignore-scripts
      - name: Verify checkout identity and release gates
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test "$(node -p 'require("./package.json").version')" = "$RELEASE_VERSION"
          mise run check
      - name: Reproduce and verify the published tarball
        run: node scripts/verify-release-tarball.mjs "$RELEASE_INTEGRITY"

  finalize:
    name: Tag pi-hunk@${{ needs.resolve.outputs.version }}
    needs: [resolve, verify]
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: write
    steps:
      - name: Create or verify the immutable release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_COMMIT: ${{ needs.resolve.outputs.commit }}
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha' 2>/dev/null || true)"
          if [ -n "$existing" ]; then
            test "$existing" = "$RELEASE_COMMIT" || {
              echo "Existing tag $RELEASE_TAG points to $existing, not $RELEASE_COMMIT" >&2
              exit 1
            }
            echo "Verified existing tag $RELEASE_TAG at $RELEASE_COMMIT"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="$RELEASE_COMMIT"
          fi
      - name: Create the GitHub release if it does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

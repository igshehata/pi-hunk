name: Bug report
description: Report a reproducible pi-hunk problem
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For vulnerabilities, stop and use private reporting from SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence, including relevant config.
      placeholder: |
        1. Start Pi in ...
        2. Run ...
        3. Press ...
    validations:
      required: true
  - type: input
    id: pi-version
    attributes:
      label: Pi version
      placeholder: 0.80.6
    validations:
      required: true
  - type: input
    id: hunk-version
    attributes:
      label: Hunk version
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: pi-hunk version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Platform and terminal
      placeholder: macOS 15 arm64, Ghostty 1.x
    validations:
      required: true
  - type: dropdown
    id: layout
    attributes:
      label: Layout
      options: [full, left, right, float, not applicable]
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description:
        Paste `/hunk status`, relevant logs, screenshots, or a short recording. Remove secrets.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: This report does not contain credentials or private source code.
          required: true
